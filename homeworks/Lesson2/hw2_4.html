<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Fjalla+One&family=Indie+Flower&family=Rubik+Pixels&family=Sedgwick+Ave+Display&display=swap');
      *{
        margin: 0;
        padding: 0;
      }
      .blocks{
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
        padding: 20px;
      }
      .cube{
        width: 250px;
        height: 250px;
        background-color: #fff3f3;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        font-size: 22px;
      }
      .rubik {
        font-family: "Rubik Pixels", system-ui;
        font-weight: 400;
        font-style: normal;
      }
      .sedgwick{
        font-family: "Sedgwick Ave Display", cursive;
        font-weight: 400;
        font-style: normal;
      }
      .dancing{
        font-family: "Dancing Script", cursive;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }
      .fjalla{
        font-family: "Fjalla One", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      .flower{
        font-family: "Indie Flower", cursive;
        font-weight: 400;
        font-style: normal;
      }
    </style>
</head>
<body>
<div class="blocks">
  <div class="cube rubik">
    <h3>Rubik Pixels</h3>
  </div>
  <div class="cube sedgwick">
    <h3>Sedgwick Ave Display</h3>
  </div>
  <div class="cube dancing">
    <h3>Dancing Script</h3>
  </div>
  <div class="cube fjalla">
    <h3>Fjalla One</h3>
  </div>
  <div class="cube flower">
    <h3>Indie Flower</h3>
  </div>
</div>
</body>
</html>
