<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      *{
        margin: 0;
      }
      header{
        height: 5vh;
        background: #D9D9D9;
      }
      main{
        height: 75vh;
        display: flex;
      }
      section{
        width: 60vw;
        height: 100%;
        background: #A4A4A4;
      }
      .aside-top{
        height: 40vh;
        width: 40vw;
        background: #7F7A7A;
      }
      .aside-bottom{
        height: 35vh;
        width: 40vw;
        background: #615050;
      }
      footer{
        height: 20vh;
      }
      .footer-top{
        height: 9vh;
        background: #D9D9D9;
      }
      .footer-bottom{
        height: 11vh;
        background: #AFA9A9;
      }
    </style>
</head>
<body>
    <header></header>
    <main>
      <section></section>
      <div>
        <aside class="aside-top"></aside>
        <aside class="aside-bottom"></aside>
      </div>
    </main>
    <footer>
      <div class="footer-top"></div>
      <div class="footer-bottom"></div>
    </footer>
</body>
</html>
